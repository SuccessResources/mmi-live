<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MMI Campaign Intelligence</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden;background:#000;
  font-family:-apple-system,'SF Pro Display',BlinkMacSystemFont,'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;color:#f1f5f9}
.app{display:flex;flex-direction:column;height:100vh}

/* ── HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:54px;background:#000;
  border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;gap:16px;z-index:1000;position:relative}
.brand{display:flex;align-items:center;gap:10px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0;
  box-shadow:0 0 0 0 rgba(34,197,94,.4);animation:livepulse 2s ease-in-out infinite}
.live-dot.loading{background:#f59e0b;animation:none;box-shadow:0 0 8px #f59e0b88}
.live-dot.error{background:#ef4444;animation:none;box-shadow:0 0 8px #ef444488}
@keyframes livepulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}70%{box-shadow:0 0 0 8px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
.brand-name{font-size:14px;font-weight:700;letter-spacing:-.025em;color:#f8fafc}
.brand-sub{font-size:9.5px;color:#334155;letter-spacing:.02em;margin-top:1px}
.hdr-kpis{display:flex;gap:0;flex:1;justify-content:center}
.hkpi{padding:0 20px;border-right:1px solid rgba(255,255,255,.05);text-align:center;cursor:default}
.hkpi:last-child{border-right:none}
.hkl{font-size:8px;font-weight:700;color:#1e3a5f;text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}
.hkv{font-size:16px;font-weight:800;color:#e2e8f0;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.hkv.accent{color:#818cf8}
.hdr-right{display:flex;align-items:center;gap:8px}
.pill-row{display:flex;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:3px;gap:2px}
.mpill{padding:3px 10px;border-radius:5px;border:none;background:transparent;color:#334155;font-size:10px;font-weight:600;cursor:pointer;transition:all .14s;white-space:nowrap}
.mpill.on{background:#6366f1;color:#fff}
.mpill:hover:not(.on){color:#64748b}
.date-sel{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:7px;
  color:#64748b;font-size:10px;padding:5px 10px;cursor:pointer;outline:none;
  font-family:inherit;font-weight:600}
.date-sel:focus{border-color:rgba(99,102,241,.4);color:#818cf8}
.rbtn{display:flex;align-items:center;gap:5px;padding:5px 13px;
  background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);
  border-radius:8px;color:#6366f1;font-size:10.5px;font-weight:700;
  cursor:pointer;transition:all .15s;white-space:nowrap}
.rbtn:hover{background:rgba(99,102,241,.18);border-color:rgba(99,102,241,.45)}
.rbtn:disabled{opacity:.4;cursor:not-allowed}
.rbtn svg{transition:transform .6s}
.rbtn.spinning svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.updated{font-size:9px;color:#1e3a5f;white-space:nowrap}

/* ── BODY */
.body{flex:1;display:flex;min-height:0}
.map-wrap{flex:1;position:relative}
#map{width:100%;height:100%;background:#010914}
.leaflet-container{background:#010914!important}
.leaflet-control-zoom{border:1px solid rgba(255,255,255,.1)!important;background:#0d0d0d!important;border-radius:8px!important;overflow:hidden}
.leaflet-control-zoom a{background:#0d0d0d!important;color:#475569!important;border-color:rgba(255,255,255,.07)!important;width:30px!important;height:30px!important;line-height:30px!important;font-size:16px!important}
.leaflet-control-zoom a:hover{background:rgba(99,102,241,.15)!important;color:#818cf8!important}
.leaflet-control-attribution{background:rgba(0,0,0,.5)!important;color:#1e3a5f!important;font-size:8px!important;border-radius:4px!important}
.leaflet-control-attribution a{color:#334155!important}

/* ── MARKERS */
.mkr-wrap{position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer}
.mkr-pulse{position:absolute;border-radius:50%;animation:mkrpulse 2.4s ease-out infinite;opacity:0}
@keyframes mkrpulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(2.6);opacity:0}}
.mkr-dot{border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:800;color:#fff;position:relative;z-index:2;
  border:1.5px solid rgba(255,255,255,.25);box-shadow:0 2px 14px rgba(0,0,0,.7);transition:transform .15s}
.mkr-wrap:hover .mkr-dot{transform:scale(1.18)}
.mkr-label{position:absolute;bottom:-19px;left:50%;transform:translateX(-50%);
  font-size:9px;font-weight:700;color:rgba(255,255,255,.65);
  white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,0,.9);pointer-events:none}

/* ── INTEL PANEL */
.panel{width:390px;background:#000;border-left:1px solid rgba(255,255,255,.07);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.ph{padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.ph-title{font-size:11px;font-weight:700;color:#334155;text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}
.ph-sub{font-size:12px;color:#1e3a5f;font-weight:500}

/* Feed */
.feed{flex:1;overflow-y:auto;padding:8px}
.feed::-webkit-scrollbar{width:3px}
.feed::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

/* Market cards */
.mcard{padding:10px 12px;border-radius:10px;background:#0d0d0d;border:1px solid rgba(255,255,255,.06);
  margin-bottom:6px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:10px}
.mcard:hover,.mcard.active{border-color:rgba(99,102,241,.3);background:rgba(99,102,241,.06)}
.mcard.active{border-color:rgba(99,102,241,.5)}
.mcard-flag{font-size:22px;flex-shrink:0;line-height:1;margin-top:1px}
.mcard-body{flex:1;min-width:0}
.mcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.mcard-name{font-size:13px;font-weight:700;color:#e2e8f0;letter-spacing:-.015em}
.mcard-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap}
.badge-top{background:rgba(99,102,241,.2);color:#818cf8}
.badge-cheap{background:rgba(34,197,94,.15);color:#4ade80}
.badge-scale{background:rgba(34,197,94,.1);color:#22c55e}
.badge-premium{background:rgba(245,158,11,.15);color:#fbbf24}
.badge-active{background:rgba(255,255,255,.05);color:#475569}
.mcard-spend{font-size:15px;font-weight:800;color:#c7d2fe;letter-spacing:-.02em;font-variant-numeric:tabular-nums;margin-bottom:4px}
.mcard-metrics{display:flex;gap:10px;flex-wrap:wrap}
.mcard-m{font-size:10px;color:#334155;font-weight:500}
.mcard-m span{color:#64748b;font-weight:700}
.mcard-bar-wrap{height:2px;background:rgba(255,255,255,.05);border-radius:1px;margin-top:6px}
.mcard-bar{height:100%;border-radius:1px;background:linear-gradient(90deg,#6366f1,#a855f7)}

/* Detail view */
.detail{flex:1;overflow-y:auto;display:none;flex-direction:column}
.detail.show{display:flex}
.detail::-webkit-scrollbar{width:3px}
.detail::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.dph{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px;flex-shrink:0}
.dph-flag{font-size:28px;line-height:1}
.dph-name{font-size:18px;font-weight:800;color:#f1f5f9;letter-spacing:-.03em}
.dph-meta{font-size:10.5px;color:#334155;margin-top:2px}
.dback{background:none;border:none;color:#334155;cursor:pointer;font-size:18px;padding:4px 6px;border-radius:6px;margin-right:2px;transition:all .12s;line-height:1}
.dback:hover{background:rgba(255,255,255,.06);color:#94a3b8}
.dmgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:12px 14px;flex-shrink:0}
.dmcard{background:#0d0d0d;border:1px solid rgba(255,255,255,.06);border-radius:9px;padding:10px 12px}
.dmcard.hi{border-color:rgba(99,102,241,.2);background:rgba(99,102,241,.05)}
.dml{font-size:8px;font-weight:700;color:#1e3a5f;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.dmv{font-size:17px;font-weight:800;color:#cbd5e1;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.dmcard.hi .dmv{color:#818cf8}
.dmcard.hi .dml{color:#4338ca}
.dcamps{padding:0 14px 14px;flex:1}
.dcsep{height:1px;background:rgba(255,255,255,.05);margin-bottom:10px}
.dcttl{font-size:9px;font-weight:700;color:#1e3a5f;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.dcamp{background:#0d0d0d;border:1px solid rgba(255,255,255,.05);border-radius:8px;padding:9px 11px;margin-bottom:5px;transition:border-color .12s}
.dcamp:hover{border-color:rgba(99,102,241,.2)}
.dc-rank{font-size:8px;font-weight:800;color:#1e3a5f;letter-spacing:.04em;display:block;margin-bottom:3px}
.dc-name{font-size:10px;color:#94a3b8;line-height:1.35;margin-bottom:5px;font-weight:500}
.dc-stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:5px}
.dc-s{font-size:9px;color:#475569}
.dc-s b{color:#94a3b8}
.dc-bar{height:2px;background:rgba(255,255,255,.04);border-radius:1px}
.dc-bf{height:100%;border-radius:1px;background:linear-gradient(90deg,#6366f1,#a855f7)}

/* ── ERROR / LOADING SCREEN */
.overlay{position:absolute;inset:0;background:#000;display:flex;align-items:center;
  justify-content:center;z-index:800;flex-direction:column;gap:12px;transition:opacity .3s}
.overlay.hidden{opacity:0;pointer-events:none}
.spin-ring{width:32px;height:32px;border:2.5px solid rgba(99,102,241,.2);
  border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite}
.overlay-txt{font-size:13px;color:#475569;font-weight:600}
.overlay-sub{font-size:11px;color:#1e3a5f;text-align:center;max-width:280px;line-height:1.5}
.retry-btn{margin-top:4px;padding:7px 18px;background:rgba(99,102,241,.1);
  border:1px solid rgba(99,102,241,.3);border-radius:8px;color:#818cf8;
  font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;display:none}
.retry-btn:hover{background:rgba(99,102,241,.2)}

.map-hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  font-size:10px;color:#1e3a5f;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.06);
  border-radius:20px;padding:4px 13px;z-index:500;pointer-events:none;white-space:nowrap;transition:opacity .8s}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<div class="hdr">
  <div class="brand">
    <div class="live-dot" id="live-dot"></div>
    <div>
      <div class="brand-name">MMI Campaign Intelligence</div>
      <div class="brand-sub">Millionaire Mind Intensive · Meta Ads</div>
    </div>
  </div>
  <div class="hdr-kpis">
    <div class="hkpi"><div class="hkl">Total Spend</div><div class="hkv accent" id="hkS">—</div></div>
    <div class="hkpi"><div class="hkl">Impressions</div><div class="hkv" id="hkI">—</div></div>
    <div class="hkpi"><div class="hkl">Blended CPM</div><div class="hkv" id="hkC">—</div></div>
    <div class="hkpi"><div class="hkl">Reach</div><div class="hkv" id="hkR">—</div></div>
    <div class="hkpi"><div class="hkl">Markets</div><div class="hkv" id="hkM">—</div></div>
    <div class="hkpi"><div class="hkl">Campaigns</div><div class="hkv" id="hkCa">—</div></div>
  </div>
  <div class="hdr-right">
    <select class="date-sel" id="preset">
      <option value="last_7_days">Last 7 days</option>
      <option value="last_14_days">Last 14 days</option>
      <option value="last_30_days" selected>Last 30 days</option>
      <option value="last_90_days">Last 90 days</option>
      <option value="this_month">This month</option>
      <option value="last_month">Last month</option>
    </select>
    <div class="pill-row">
      <button class="mpill on" data-m="spend">Spend</button>
      <button class="mpill" data-m="cpm">CPM</button>
      <button class="mpill" data-m="impressions">Impr.</button>
      <button class="mpill" data-m="reach">Reach</button>
    </div>
    <button class="rbtn" id="rbtn">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      Refresh
    </button>
    <div class="updated" id="updated"></div>
  </div>
</div>

<!-- BODY -->
<div class="body">
  <div class="map-wrap">
    <div id="map"></div>

    <!-- Loading / Error overlay -->
    <div class="overlay" id="overlay">
      <div class="spin-ring" id="spin"></div>
      <div class="overlay-txt" id="ov-txt">Loading campaign data…</div>
      <div class="overlay-sub" id="ov-sub">Fetching live data from Meta Ads API</div>
      <button class="retry-btn" id="retry-btn" onclick="loadData()">Try again</button>
    </div>

    <div class="map-hint" id="hint">Click any marker to view campaign details</div>
  </div>

  <!-- INTEL PANEL -->
  <div class="panel" id="panel">
    <div class="ph" id="feed-hdr">
      <div class="ph-title">Market Intelligence</div>
      <div class="ph-sub" id="feed-sub">Loading…</div>
    </div>
    <div class="feed" id="feed"></div>
    <div class="detail" id="detail">
      <div class="dph" id="dph">
        <button class="dback" id="dback">←</button>
        <div class="dph-flag" id="d-flag">🌍</div>
        <div>
          <div class="dph-name" id="d-name">—</div>
          <div class="dph-meta" id="d-meta">—</div>
        </div>
      </div>
      <div class="dmgrid" id="d-grid"></div>
      <div class="dcamps" id="d-camps"></div>
    </div>
  </div>

</div>
</div>

<script>
// ── COUNTRY METADATA (static — coordinates, flag, name)
const META = {
  AT:{lat:47.5,lng:14.5,flag:'🇦🇹',name:'Austria',region:'Europe'},
  BE:{lat:50.85,lng:4.35,flag:'🇧🇪',name:'Belgium',region:'Europe'},
  CH:{lat:46.8,lng:8.2,flag:'🇨🇭',name:'Switzerland',region:'Europe'},
  DE:{lat:51.2,lng:10.5,flag:'🇩🇪',name:'Germany',region:'Europe'},
  DK:{lat:56.0,lng:10.0,flag:'🇩🇰',name:'Denmark',region:'Europe'},
  ES:{lat:40.4,lng:-3.7,flag:'🇪🇸',name:'Spain',region:'Europe'},
  FI:{lat:64.0,lng:26.0,flag:'🇫🇮',name:'Finland',region:'Europe'},
  FR:{lat:46.6,lng:2.3,flag:'🇫🇷',name:'France',region:'Europe'},
  GB:{lat:54.0,lng:-2.5,flag:'🇬🇧',name:'United Kingdom',region:'Europe'},
  HR:{lat:45.1,lng:16.5,flag:'🇭🇷',name:'Croatia',region:'Europe'},
  HU:{lat:47.2,lng:19.5,flag:'🇭🇺',name:'Hungary',region:'Europe'},
  ID:{lat:-2.5,lng:118.0,flag:'🇮🇩',name:'Indonesia',region:'Asia'},
  IT:{lat:42.8,lng:12.8,flag:'🇮🇹',name:'Italy',region:'Europe'},
  MA:{lat:31.8,lng:-7.1,flag:'🇲🇦',name:'Morocco',region:'Africa'},
  MY:{lat:4.2,lng:109.5,flag:'🇲🇾',name:'Malaysia',region:'Asia'},
  NL:{lat:52.3,lng:5.3,flag:'🇳🇱',name:'Netherlands',region:'Europe'},
  NO:{lat:65.0,lng:16.0,flag:'🇳🇴',name:'Norway',region:'Europe'},
  PH:{lat:12.9,lng:121.8,flag:'🇵🇭',name:'Philippines',region:'Asia'},
  PL:{lat:52.0,lng:19.5,flag:'🇵🇱',name:'Poland',region:'Europe'},
  PT:{lat:39.4,lng:-8.2,flag:'🇵🇹',name:'Portugal',region:'Europe'},
  RS:{lat:44.0,lng:21.0,flag:'🇷🇸',name:'Serbia',region:'Europe'},
  SE:{lat:60.1,lng:18.6,flag:'🇸🇪',name:'Sweden',region:'Europe'},
  SG:{lat:1.35,lng:103.8,flag:'🇸🇬',name:'Singapore',region:'Asia'},
  SI:{lat:46.1,lng:14.8,flag:'🇸🇮',name:'Slovenia',region:'Europe'},
  SK:{lat:48.7,lng:19.5,flag:'🇸🇰',name:'Slovakia',region:'Europe'},
  TH:{lat:15.9,lng:100.9,flag:'🇹🇭',name:'Thailand',region:'Asia'},
  TW:{lat:23.7,lng:121.0,flag:'🇹🇼',name:'Taiwan',region:'Asia'},
  US:{lat:38.0,lng:-97.0,flag:'🇺🇸',name:'United States',region:'Americas'},
};

// Active markets to show (others hidden even if API returns them)
const ACTIVE = new Set(['BE','CH','DE','ES','GB','MY','NL','PL','SG','SI','TH']);

// ── STATE
let DATA       = {};
let ISOS       = [];
let curMetric  = 'spend';
let activeIso  = null;
let markers    = {};

// ── LEAFLET MAP
const map = L.map('map', {center:[35,40], zoom:3, zoomControl:true, minZoom:2, maxZoom:9});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains:'abcd', maxZoom:19
}).addTo(map);

// ── HELPERS
function fmt(v, m) {
  if (m === 'spend') return '£' + Math.round(v).toLocaleString('en-GB');
  if (m === 'impressions' || m === 'reach') {
    if (v >= 1e6) return (v/1e6).toFixed(1) + 'M';
    if (v >= 1000) return Math.round(v/1000) + 'K';
    return '' + Math.round(v);
  }
  if (m === 'cpm') return '£' + v.toFixed(2);
  if (m === 'frequency') return v.toFixed(2) + '×';
  return '' + v;
}

function getBadge(iso) {
  const d = DATA[iso];
  const maxSpend = Math.max(...ISOS.map(i => DATA[i].spend));
  if (d.spend === maxSpend)   return {cls:'badge-top',     txt:'Top Market'};
  if (d.cpm < 5)              return {cls:'badge-cheap',   txt:'Lowest CPM'};
  if (d.cpm < 9 && d.spend > 1500) return {cls:'badge-scale', txt:'Scale Ready'};
  if (d.cpm > 20)             return {cls:'badge-premium', txt:'Premium'};
  return                             {cls:'badge-active',  txt:'Active'};
}

function markerColor(iso) {
  const cpm = DATA[iso].cpm;
  if (cpm < 6)  return {dot:'#22c55e', pulse:'rgba(34,197,94,.45)'};
  if (cpm < 12) return {dot:'#6366f1', pulse:'rgba(99,102,241,.45)'};
  if (cpm < 18) return {dot:'#818cf8', pulse:'rgba(129,140,248,.35)'};
  return              {dot:'#f59e0b', pulse:'rgba(245,158,11,.45)'};
}

function markerSize(iso) {
  const spend = DATA[iso].spend;
  const max   = Math.max(...ISOS.map(i => DATA[i].spend));
  return Math.max(14, Math.round(Math.sqrt(spend / max) * 38));
}

// ── BUILD / REFRESH MARKERS
function rebuildMarkers() {
  // Remove old markers
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  ISOS.forEach(iso => {
    const d   = DATA[iso];
    const m   = META[iso];
    if (!m) return;
    const sz  = markerSize(iso);
    const col = markerColor(iso);
    const tot = sz + 18;
    const delay = (Math.random() * 1.8).toFixed(1);

    const el = document.createElement('div');
    el.className = 'mkr-wrap';
    el.style.cssText = `width:${tot}px;height:${tot}px`;
    el.innerHTML = `
      <div class="mkr-pulse" style="width:${sz}px;height:${sz}px;background:${col.pulse};animation-delay:${delay}s"></div>
      <div class="mkr-dot" style="width:${sz}px;height:${sz}px;background:${col.dot};font-size:${Math.max(8,sz/3.5)}px">${iso}</div>
      <div class="mkr-label">${fmt(d[curMetric], curMetric)}</div>`;

    const icon = L.divIcon({html:el.outerHTML, className:'', iconSize:[tot,tot+20], iconAnchor:[tot/2,tot/2]});
    const mk = L.marker([m.lat, m.lng], {icon}).addTo(map);
    mk.on('click', () => openDetail(iso));
    markers[iso] = mk;
  });
}

// ── BUILD FEED
function buildFeed() {
  const sorted = [...ISOS].sort((a,b) => DATA[b][curMetric] - DATA[a][curMetric]);
  const maxVal = Math.max(...sorted.map(i => DATA[i][curMetric]));
  document.getElementById('feed-sub').textContent = `${ISOS.length} active markets · sorted by ${curMetric}`;
  document.getElementById('feed').innerHTML = sorted.map(iso => {
    const d = DATA[iso], m = META[iso] || {};
    const badge = getBadge(iso);
    const pct = (d[curMetric] / maxVal * 100).toFixed(1);
    return `<div class="mcard${activeIso===iso?' active':''}" onclick="openDetail('${iso}')">
      <div class="mcard-flag">${m.flag||'🌍'}</div>
      <div class="mcard-body">
        <div class="mcard-top">
          <div class="mcard-name">${m.name||iso}</div>
          <div class="mcard-badge ${badge.cls}">${badge.txt}</div>
        </div>
        <div class="mcard-spend">${fmt(d[curMetric], curMetric)}</div>
        <div class="mcard-metrics">
          <div class="mcard-m">CPM <span>${fmt(d.cpm,'cpm')}</span></div>
          <div class="mcard-m">Impr. <span>${fmt(d.impressions,'impressions')}</span></div>
          <div class="mcard-m">Freq. <span>${fmt(d.frequency,'frequency')}</span></div>
        </div>
        <div class="mcard-bar-wrap"><div class="mcard-bar" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  }).join('');
}

// ── OPEN DETAIL
function openDetail(iso) {
  const d = DATA[iso], m = META[iso] || {};
  activeIso = iso;
  map.flyTo([m.lat||35, m.lng||40], 5, {duration:1.3});
  document.getElementById('feed').style.display = 'none';
  document.getElementById('feed-hdr').style.display = 'none';
  document.getElementById('detail').classList.add('show');
  document.getElementById('d-flag').textContent = m.flag || '🌍';
  document.getElementById('d-name').textContent = m.name || iso;
  document.getElementById('d-meta').textContent = `${d.campaign_count} campaigns · ${m.region||''} · ${document.getElementById('preset').options[document.getElementById('preset').selectedIndex].text}`;

  document.getElementById('d-grid').innerHTML = [
    ['Total Spend','spend',true],['Impressions','impressions',false],
    ['Reach','reach',false],['CPM','cpm',false],
    ['Avg Frequency','frequency',true],['Campaigns','campaign_count',false]
  ].map(([l,k,hi]) => `<div class="dmcard${hi?' hi':''}">
    <div class="dml">${l}</div>
    <div class="dmv">${k==='campaign_count'?d[k]:fmt(d[k]||0,k)}</div>
  </div>`).join('');

  const mx = Math.max(...(d.campaigns||[]).map(c=>c.spend), 1);
  document.getElementById('d-camps').innerHTML =
    `<div class="dcsep"></div><div class="dcttl">Campaigns · ranked by spend</div>` +
    (d.campaigns||[]).slice(0,12).map((c,i) => `
    <div class="dcamp">
      <span class="dc-rank">#${i+1}</span>
      <div class="dc-name">${c.name}</div>
      <div class="dc-stats">
        <div class="dc-s">Spend <b>${fmt(c.spend,'spend')}</b></div>
        <div class="dc-s">CPM <b>${fmt(c.cpm,'cpm')}</b></div>
        <div class="dc-s">Freq <b>${c.frequency}×</b></div>
      </div>
      <div class="dc-bar"><div class="dc-bf" style="width:${(c.spend/mx*100).toFixed(1)}%"></div></div>
    </div>`).join('');

  document.getElementById('hint').style.opacity = '0';
}

// ── BACK
document.getElementById('dback').onclick = () => {
  activeIso = null;
  document.getElementById('detail').classList.remove('show');
  document.getElementById('feed').style.display = '';
  document.getElementById('feed-hdr').style.display = '';
  buildFeed();
  map.flyTo([35,40], 3, {duration:1.1});
};

// ── UPDATE HEADER KPIs
function updateKPIs() {
  const vs = Object.values(DATA);
  const spend = vs.reduce((s,d) => s+d.spend, 0);
  const imp   = vs.reduce((s,d) => s+d.impressions, 0);
  const reach = vs.reduce((s,d) => s+d.reach, 0);
  const camps = vs.reduce((s,d) => s+d.campaign_count, 0);
  document.getElementById('hkS').textContent  = fmt(spend, 'spend');
  document.getElementById('hkI').textContent  = fmt(imp, 'impressions');
  document.getElementById('hkC').textContent  = fmt(imp>0 ? spend/imp*1000 : 0, 'cpm');
  document.getElementById('hkR').textContent  = fmt(reach, 'impressions');
  document.getElementById('hkM').textContent  = ISOS.length;
  document.getElementById('hkCa').textContent = camps;
}

// ── LOAD DATA FROM API
async function loadData() {
  const dot    = document.getElementById('live-dot');
  const rbtn   = document.getElementById('rbtn');
  const ov     = document.getElementById('overlay');
  const ovTxt  = document.getElementById('ov-txt');
  const ovSub  = document.getElementById('ov-sub');
  const retry  = document.getElementById('retry-btn');
  const spin   = document.getElementById('spin');
  const preset = document.getElementById('preset').value;

  // Loading state
  dot.className = 'live-dot loading';
  rbtn.disabled = true;
  rbtn.classList.add('spinning');
  ov.classList.remove('hidden');
  spin.style.display = 'block';
  retry.style.display = 'none';
  ovTxt.textContent = 'Fetching live data…';
  ovSub.textContent = `Loading ${preset.replace(/_/g,' ')} data from Meta Ads API`;

  try {
    const res  = await fetch(`/api/insights?preset=${preset}`);
    const json = await res.json();

    if (!res.ok || json.error) throw new Error(json.error || `HTTP ${res.status}`);

    // Filter to active markets only (ignore any with zero spend or no META coords)
    DATA = {};
    for (const [iso, d] of Object.entries(json.data || {})) {
      if (ACTIVE.has(iso) && META[iso] && d.spend > 0) DATA[iso] = d;
    }
    ISOS = Object.keys(DATA).sort((a,b) => DATA[b].spend - DATA[a].spend);

    // Update UI
    updateKPIs();
    buildFeed();
    rebuildMarkers();

    // Success state
    dot.className = 'live-dot';
    const now = new Date();
    document.getElementById('updated').textContent =
      `Updated ${now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`;
    ov.classList.add('hidden');

  } catch (err) {
    // Error state
    dot.className = 'live-dot error';
    spin.style.display = 'none';
    ovTxt.textContent = 'Failed to load data';
    ovSub.textContent = err.message.includes('META_ACCESS_TOKEN')
      ? 'Set META_ACCESS_TOKEN and META_ACCOUNT_ID in your Vercel environment variables.'
      : err.message;
    retry.style.display = 'block';
    console.error('[loadData]', err);
  } finally {
    rbtn.disabled = false;
    rbtn.classList.remove('spinning');
  }
}

// ── METRIC PILLS
document.querySelectorAll('.mpill').forEach(b => b.addEventListener('click', () => {
  curMetric = b.dataset.m;
  document.querySelectorAll('.mpill').forEach(p => p.classList.remove('on'));
  b.classList.add('on');
  buildFeed();
  rebuildMarkers();
  if (activeIso) openDetail(activeIso);
}));

// ── DATE PRESET
document.getElementById('preset').addEventListener('change', () => loadData());

// ── REFRESH BUTTON
document.getElementById('rbtn').addEventListener('click', () => loadData());

// ── HINT FADE
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 6000);

// ── BOOT
loadData();
</script>
</body>
